server:
  port: 8084

spring:
  application:
    name: product-service

  config:
    import: "optional:configserver:http://localhost:8089"

  datasource:
    url: jdbc:mysql://localhost:3307/product_db
    username: root
    password: mysql123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8762/eureka/

  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
